name: CI Compra Tu Hogar

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

  backend-ci:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python y UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sincronizar dependencias
        run: uv sync
        working-directory: ./backend

      - name: Requisito de Calidad (Ruff Linter)
        run: uv run ruff check .
        working-directory: ./backend

      - name: Ejecutar Pruebas Unitarias e Integración (Pytest)
        run: uv run pytest
        working-directory: ./backend

  frontend-ci:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python y UV (para Backend de soporte)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sincronizar dependencias Backend
        run: uv sync
        working-directory: ./backend

      - name: Iniciar Backend en segundo plano
        run: |
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          npx wait-on http://127.0.0.1:8000/docs --timeout 30000
        working-directory: ./backend

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Instalar dependencias Frontend
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Requisito de Calidad (Linting)
        run: npm run lint
        working-directory: ./frontend

      - name: Validar compilación final (Build Test)
        run: npm run build
        working-directory: ./frontend

      - name: Instalar Navegadores de Playwright
        run: npx playwright install --with-deps
        working-directory: ./frontend

      - name: Iniciar Servidor Frontend en segundo plano
        run: |
          nohup npm run dev -- --port 5173 &
          npx wait-on http://localhost:5173 --timeout 30000
        working-directory: ./frontend

      - name: Ejecutar Pruebas End-to-End
        run: npm run test:e2e
        working-directory: ./frontend

  build-and-push:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Loguearse en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/compra-tu-hogar-backend:latest

      - name: Build y Push Frontend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/compra-tu-hogar-frontend:latest