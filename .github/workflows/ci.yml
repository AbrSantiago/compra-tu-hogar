name: CI Compra Tu Hogar

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python y UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sincronizar dependencias
        run: uv sync
        working-directory: ./backend

      - name: Requisito de Calidad (Ruff Linter)
        run: uv run ruff check .
        working-directory: ./backend

      - name: Ejecutar Tests Unitarios
        run: uv run pytest
        working-directory: ./backend
        env:
          DATABASE_URL: "sqlite:///:memory:"

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Requisito de Calidad (Linting)
        run: npm run lint
        working-directory: ./frontend

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps
        working-directory: ./frontend

      - name: Levantar entorno completo con Docker Compose para E2E
        run: |
          docker compose up --build -d
          sleep 20
          docker compose exec -T backend uv run python app/seeds/seed.py

      - name: Ejecutar Tests de Cucumber (E2E)
        run: npm run test:e2e
        working-directory: ./frontend

      - name: Apagar entorno de pruebas
        if: always()
        run: docker compose down -v

      - name: Validar compilación final (Build Test)
        run: npm run build
        working-directory: ./frontend

  build-and-push:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Loguearse en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/compra-tu-hogar-backend:latest

      - name: Build y Push Frontend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/compra-tu-hogar-frontend:latest